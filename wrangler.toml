name = "scentoria-monitor"
main = "src/worker.js"
compatibility_date = "2026-06-01"

# Enables the workers.dev URL (the `fetch` handler in src/worker.js, used as a
# manual trigger / health check). The first `wrangler deploy` will prompt you to
# register a workers.dev subdomain — that one-time step also enables cron
# triggers on the account. Set this false later if you want cron-only.
workers_dev = true

# Cron Trigger: every 2 minutes (Cloudflare allows down to every 1 minute).
# Change this to "*/1 * * * *" for 1-min, or "*/5 * * * *" to match the old setup.
[triggers]
crons = ["*/2 * * * *"]

# State storage. The `id` is filled in by `wrangler kv namespace create STATE`
# (see README). The binding name `STATE` must match env.STATE in src/worker.js.
[[kv_namespaces]]
binding = "STATE"
id = "c9ac01a075cd42179cddb8ce25ded50f"

# Notifications go to a Telegram bot. Set these as secrets, NOT here:
#   printf '%s' "<bot token>" | npx wrangler secret put TG_BOT_TOKEN
#   printf '%s' "<chat id>"   | npx wrangler secret put TG_CHAT_ID
#   printf '%s' "<random>"    | npx wrangler secret put TRIGGER_KEY  # optional

[observability]
enabled = true
